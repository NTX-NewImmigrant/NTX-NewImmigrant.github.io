<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北德州新移民落地服務 | 達拉斯、Frisco、Plano 安家租房與綠卡落地指南</title>
</head>
<body style="font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #f8fafc; padding: 60px 20px; line-height: 1.8;">
    
    <!-- 網頁裡的大標題 -->
    <h1 style="color: #0f172a; font-size: 36px; margin-bottom: 24px; font-weight: 800; letter-spacing: 1px;">
        北德州新移民一站式落地服務
    </h1>
    
    <!-- 網頁裡的一般副標題 -->
    <p style="font-size: 22px; color: #dc2626; font-weight: 700; margin-bottom: 45px; letter-spacing: 0.5px;">
        第一代新移民：不必麻煩親友、不欠人情、絕不踩雷！
    </p>
    
    <!-- 白色框框裡面的提示文字 -->
    <div style="background: #ffffff; padding: 35px 40px; display: inline-block; max-width: 650px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); border-top: 6px solid #1e3a8a;">
        <p style="font-size: 19px; color: #334155; margin-bottom: 25px; font-weight: 600; letter-spacing: 0.5px;">
            💡 提前準備，順利落地 —— 安心開始你的德州新生活。
        </p>
        
        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin-bottom: 25px;">
        
        <!-- 聯絡資訊區塊 -->
        <p style="font-size: 16px; color: #64748b; margin-bottom: 12px; font-weight: bold;">歡迎來信諮詢細節：</p>
        
        <div style="margin-bottom: 15px;">
            <!-- 原本的直接點擊發信按鈕 -->
            <a href="mailto:ntxnewimmigrant@gmail.com" style="display: inline-block; background-color: #1e40af; color: white; padding: 12px 28px; text-decoration: none; font-size: 16px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(30, 64, 175, 0.2);">
                ✉️ 直接發信：ntxnewimmigrant@gmail.com
            </a>
        </div>

        <div>
            <!-- 全新新增：一鍵複製按鈕 -->
            <button id="copyBtn" onclick="copyEmail()" style="display: inline-block; background-color: #10b981; color: white; padding: 12px 28px; border: none; font-size: 16px; font-weight: bold; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2); cursor: pointer;">
                📋 點此直接複製 Email 網址
            </button>
        </div>
    </div>

    <!-- 頁尾 SEO 關鍵字 -->
    <p style="font-size: 12px; color: #94a3b8; margin-top: 80px;">
        服務地區：Frisco, Plano, Dallas, North Texas | 美國新移民 | 達拉斯安家 | Frisco租房 | 美國綠卡落地 | 美国新移民 | 达拉斯安家 | 绿卡落地 | 美国移民 | 德州落地服务
    </p>

    <!-- 負責執行複製功能的隱形小腳本 -->
    <script>
        function copyEmail() {
            var email = "ntxnewimmigrant@gmail.com";
            navigator.clipboard.writeText(email).then(function() {
                var btn = document.getElementById("copyBtn");
                btn.innerText = "✅ 已複製成功！可直接貼上";
                btn.style.backgroundColor = "#059669";
                setTimeout(function() {
                    btn.innerText = "📋 點此直接複製 Email 網址";
                    btn.style.backgroundColor = "#10b981";
                }, 3000);
            }).catch(function(err) {
                alert("複製失敗，請手動複製： " + email);
            });
        }
    </script>

</body>
</html>
